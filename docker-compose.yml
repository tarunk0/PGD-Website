version: '3.9'

services:
  # Development/Local Flask Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pgd-website-dev
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app.py
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
      - /app/__pycache__
    command: python app.py
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
