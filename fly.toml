# fly.toml app configuration file generated for pgd-website on 2026-04-10T01:19:57+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pgd-website'
primary_region = 'sin'

[deploy]
  strategy = 'rolling'
  wait_timeout = '5m0s'
  release_command = "python -c \"from app import db, app; app.app_context().push(); db.create_all(); print('✓ Database tables created')\""

[env]
  FLASK_APP = 'app.py'
  FLASK_ENV = 'production'
  PYTHONUNBUFFERED = '1'

[processes]
  web = 'gunicorn --bind 0.0.0.0:5000 app:app'

[[mounts]]
  source = 'pgd_data'
  destination = '/app/instance'
  initial_size = '1GB'

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['web']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '5s'
    method = 'GET'
    path = '/'
    protocol = 'http'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
