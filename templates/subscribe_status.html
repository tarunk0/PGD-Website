<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex, nofollow"/>
<title>Newsletter – PGD</title>
<link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #00172D;
    --copper: #b87333;
    --copper-lt: #d4956b;
    --ivory: #F9F6EE;
    --font-serif: 'Cinzel', Georgia, serif;
    --font-sans: 'Montserrat', 'Segoe UI', Arial, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-sans);
    background: var(--ivory);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .status-card {
    max-width: 480px;
    width: 90%;
    text-align: center;
    background: #fff;
    border: 1px solid #e8e0d4;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,23,45,0.08);
  }
  .status-header {
    background: var(--navy);
    padding: 28px 24px;
    border-bottom: 3px solid var(--copper);
  }
  .status-header .logo {
    font-family: var(--font-serif);
    font-size: 28px;
    color: var(--copper-lt);
    letter-spacing: 4px;
  }
  .status-body { padding: 40px 28px; }
  .status-icon { font-size: 48px; margin-bottom: 16px; }
  .status-body h2 {
    font-family: var(--font-serif);
    color: var(--navy);
    font-size: 1.4rem;
    margin-bottom: 12px;
  }
  .status-body p {
    color: #555;
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 28px;
  }
  .status-link {
    display: inline-block;
    background: var(--copper);
    color: #fff;
    text-decoration: none;
    padding: 12px 28px;
    border-radius: 3px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: background 0.2s;
  }
  .status-link:hover { background: var(--copper-lt); }
  .status-footer {
    background: var(--navy);
    padding: 14px;
    text-align: center;
  }
  .status-footer span {
    color: rgba(249,246,238,0.3);
    font-size: 10px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="status-card">
  <div class="status-header">
    <span class="logo">PGD</span>
  </div>
  <div class="status-body">
    {% if status == 'success' %}
      <div class="status-icon">✓</div>
      <h2>Subscription Confirmed</h2>
    {% elif status == 'already' %}
      <div class="status-icon">✓</div>
      <h2>Already Confirmed</h2>
    {% elif status == 'unsubscribed' %}
      <div class="status-icon">👋</div>
      <h2>Unsubscribed</h2>
    {% else %}
      <div class="status-icon">⚠</div>
      <h2>Something Went Wrong</h2>
    {% endif %}
    <p>{{ message }}</p>
    <a href="/" class="status-link">Back to PGD</a>
  </div>
  <div class="status-footer">
    <span>© 2026 Pandra Global Dynamics Pvt Ltd</span>
  </div>
</div>
</body>
</html>
