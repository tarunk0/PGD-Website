<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex, nofollow"/>
<title>Admin – Newsletter Subscribers – PGD</title>
<link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css"/>
<style>
  .admin-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem;
    background: var(--ivory);
    min-height: 100vh;
  }
  .admin-header {
    background: var(--navy);
    color: var(--ivory);
    padding: 2rem;
    margin: -2rem -2rem 2rem -2rem;
    border-bottom: 3px solid var(--copper);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .admin-header h1 {
    font-family: var(--font-serif);
    font-size: 2rem;
    margin: 0;
    color: var(--copper-lt);
  }
  .admin-nav {
    display: flex;
    gap: 1rem;
    align-items: center;
  }
  .admin-nav a {
    color: rgba(249,246,238,0.5);
    text-decoration: none;
    font-size: 0.75rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .admin-nav a:hover, .admin-nav a.active { color: var(--copper-lt); }
  .admin-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1.2rem;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: #fff;
    border: 1px solid #e8e0d4;
    padding: 1.5rem;
    text-align: center;
    border-radius: 4px;
  }
  .stat-number {
    font-family: var(--font-serif);
    font-size: 2rem;
    color: var(--copper);
    display: block;
  }
  .stat-label {
    font-size: 0.7rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #888;
    margin-top: 0.3rem;
  }
  .actions-bar {
    display: flex;
    justify-content: flex-end;
    gap: 0.8rem;
    margin-bottom: 1.5rem;
  }
  .btn-export {
    background: var(--navy);
    color: var(--ivory);
    border: none;
    padding: 0.6rem 1.2rem;
    font-size: 0.7rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    border-radius: 3px;
    transition: background 0.2s;
  }
  .btn-export:hover { background: var(--copper); }
  .subscribers-table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border: 1px solid #e8e0d4;
    border-radius: 4px;
    overflow: hidden;
  }
  .subscribers-table th {
    background: var(--navy);
    color: var(--ivory);
    padding: 1rem;
    text-align: left;
    font-size: 0.7rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .subscribers-table td {
    padding: 0.8rem 1rem;
    border-bottom: 1px solid #f0ebe3;
    font-size: 0.85rem;
    color: #333;
  }
  .subscribers-table tr:hover td { background: rgba(184,115,51,0.04); }
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .badge-active { background: #e6f4ea; color: #1a7431; }
  .badge-pending { background: #fff3e0; color: #b87333; }
  .badge-inactive { background: #fce8e6; color: #c5221f; }
  .empty-msg {
    text-align: center;
    padding: 3rem;
    color: #999;
    font-size: 0.9rem;
  }
  /* Compose Panel */
  .compose-panel {
    display: none;
    background: #fff;
    border: 1px solid #e8e0d4;
    border-radius: 4px;
    padding: 2rem;
    margin-bottom: 1.5rem;
  }
  .compose-panel.open { display: block; }
  .compose-panel h2 {
    font-family: var(--font-serif);
    font-size: 1.2rem;
    color: var(--navy);
    margin: 0 0 1.5rem;
    padding-bottom: 0.8rem;
    border-bottom: 1px solid #e8e0d4;
  }
  .compose-tabs {
    display: flex;
    margin-bottom: 1rem;
    border-bottom: 2px solid #e8e0d4;
  }
  .compose-tab {
    padding: 0.6rem 1.2rem;
    font-size: 0.72rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: none;
    color: #999;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: color 0.2s;
  }
  .compose-tab.active { color: var(--copper); border-bottom-color: var(--copper); }
  .compose-field { margin-bottom: 1.2rem; }
  .compose-field label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 0.4rem;
    font-weight: 600;
  }
  .compose-field input, .compose-field textarea {
    width: 100%;
    padding: 0.7rem 1rem;
    border: 1px solid #e8e0d4;
    background: #fafafa;
    font-family: var(--font-sans);
    font-size: 0.85rem;
    color: #333;
    outline: none;
    box-sizing: border-box;
    transition: border-color 0.2s;
  }
  .compose-field input:focus, .compose-field textarea:focus { border-color: var(--copper); }
  .compose-field textarea { height: 240px; resize: vertical; font-family: monospace; font-size: 0.82rem; }
  .compose-preview iframe { width: 100%; height: 320px; border: 1px solid #e8e0d4; background: #fff; }
  .compose-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 1rem;
    border-top: 1px solid #f0ebe3;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .compose-recipient-info { font-size: 0.82rem; color: #666; }
  .compose-recipient-info strong { color: var(--copper); font-size: 1.1rem; }
  .btn-send {
    background: var(--copper);
    color: #fff;
    border: none;
    padding: 0.7rem 2rem;
    font-size: 0.72rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 3px;
    transition: background 0.2s;
  }
  .btn-send:hover { background: #a0622d; }
  .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
  .compose-result {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    border-radius: 3px;
    font-size: 0.85rem;
    display: none;
  }
  .compose-result.success { background: #e6f4ea; color: #1a7431; border: 1px solid #b7dfbf; }
  .compose-result.error { background: #fce8e6; color: #c5221f; border: 1px solid #f3b9b4; }
  .compose-result.sending { background: #e8f0fe; color: #1a56d3; border: 1px solid #b3c9fb; }
  /* Confirm Modal */
  .confirm-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,23,45,0.75);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .confirm-overlay.open { display: flex; }
  .confirm-box {
    background: #fff;
    border-radius: 6px;
    padding: 2rem;
    max-width: 420px;
    width: 90%;
    border-top: 4px solid var(--copper);
  }
  .confirm-box h3 { font-family: var(--font-serif); color: var(--navy); margin: 0 0 0.8rem; font-size: 1.2rem; }
  .confirm-box p { font-size: 0.85rem; color: #555; margin: 0 0 1.5rem; line-height: 1.6; }
  .confirm-actions { display: flex; gap: 0.8rem; justify-content: flex-end; }
  .btn-confirm { background: var(--copper); color: #fff; border: none; padding: 0.6rem 1.5rem; cursor: pointer; border-radius: 3px; font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; }
  .btn-confirm:hover { background: #a0622d; }
  .btn-cancel { background: #f0ebe3; color: #555; border: none; padding: 0.6rem 1.2rem; cursor: pointer; border-radius: 3px; font-size: 0.75rem; }
  .btn-cancel:hover { background: #e8e0d4; }
  @media (max-width: 768px) {
    .admin-header { flex-direction: column; text-align: center; }
    .subscribers-table { font-size: 0.75rem; }
    .subscribers-table th, .subscribers-table td { padding: 0.6rem 0.5rem; }
  }
</style>
</head>
<body>
<div class="admin-container">
  <div class="admin-header">
    <h1>Newsletter Subscribers</h1>
    <nav class="admin-nav">
      <a href="/admin/inquiries">Inquiries</a>
      <a href="/admin/subscribers" class="active">Subscribers</a>
      <a href="/admin/logout">Logout</a>
    </nav>
  </div>

  <div class="admin-stats" id="statsGrid">
    <div class="stat-card"><span class="stat-number" id="totalCount">–</span><div class="stat-label">Total</div></div>
    <div class="stat-card"><span class="stat-number" id="activeCount">–</span><div class="stat-label">Active</div></div>
    <div class="stat-card"><span class="stat-number" id="pendingCount">–</span><div class="stat-label">Pending</div></div>
    <div class="stat-card"><span class="stat-number" id="unsubCount">–</span><div class="stat-label">Unsubscribed</div></div>
  </div>

  <div class="actions-bar">
    <button class="btn-export" id="btnCompose" onclick="toggleCompose()">&#9993; Compose Newsletter</button>
    <a href="/api/subscribers/export/csv" class="btn-export">Export CSV</a>
  </div>

  <!-- Compose Panel -->
  <div class="compose-panel" id="composePanel">
    <h2>Compose Newsletter</h2>
    <div class="compose-tabs">
      <button class="compose-tab active" id="tabWrite" onclick="switchTab('write')">Write</button>
      <button class="compose-tab" id="tabPreview" onclick="switchTab('preview')">Preview</button>
    </div>
    <div id="paneWrite">
      <div class="compose-field">
        <label for="nSubject">Subject Line</label>
        <input type="text" id="nSubject" placeholder="e.g. New Products Available – April 2026" maxlength="200"/>
      </div>
      <div class="compose-field">
        <label for="nBody">Email Body (HTML supported)</label>
        <textarea id="nBody" placeholder="Write your newsletter here. HTML is supported.&#10;&#10;Example:&#10;&lt;h2&gt;New Arrivals&lt;/h2&gt;&lt;p&gt;We have exciting new products...&lt;/p&gt;"></textarea>
      </div>
    </div>
    <div id="panePreview" style="display:none;">
      <div class="compose-field">
        <label>Preview — renders in PGD email template</label>
        <iframe id="previewFrame" title="Email Preview"></iframe>
      </div>
    </div>
    <div class="compose-footer">
      <div class="compose-recipient-info">Sending to <strong id="recipientCount">–</strong> confirmed subscribers</div>
      <button class="btn-send" id="btnSend" onclick="confirmSend()">Send Newsletter</button>
    </div>
    <div class="compose-result" id="composeResult"></div>
  </div>

  <!-- Confirm Modal -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <h3>Confirm Send</h3>
      <p id="confirmText">Send this newsletter to all confirmed subscribers?</p>
      <div class="confirm-actions">
        <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
        <button class="btn-confirm" onclick="doSend()">Yes, Send</button>
      </div>
    </div>
  </div>

  <table class="subscribers-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Email</th>
        <th>Name</th>
        <th>Status</th>
        <th>Subscribed</th>
        <th>Confirmed</th>
      </tr>
    </thead>
    <tbody id="subscribersBody">
      <tr><td colspan="6" class="empty-msg">Loading...</td></tr>
    </tbody>
  </table>
</div>

<script>
// ── Subscriber Table ──────────────────────────────────────────────
var activeCount = 0;

(function() {
  fetch('/api/subscribers')
    .then(r => r.json())
    .then(data => {
      if (!data.success) return;
      const subs = data.subscribers;
      const total = subs.length;
      const active = subs.filter(s => s.is_active && s.is_confirmed).length;
      const pending = subs.filter(s => s.is_active && !s.is_confirmed).length;
      const unsub = subs.filter(s => !s.is_active).length;

      activeCount = active;
      document.getElementById('totalCount').textContent = total;
      document.getElementById('activeCount').textContent = active;
      document.getElementById('pendingCount').textContent = pending;
      document.getElementById('unsubCount').textContent = unsub;
      document.getElementById('recipientCount').textContent = active;

      const tbody = document.getElementById('subscribersBody');
      if (total === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-msg">No subscribers yet.</td></tr>';
        return;
      }
      tbody.innerHTML = subs.map((s, i) => {
        let badge;
        if (s.is_active && s.is_confirmed) badge = '<span class="badge badge-active">Active</span>';
        else if (s.is_active && !s.is_confirmed) badge = '<span class="badge badge-pending">Pending</span>';
        else badge = '<span class="badge badge-inactive">Unsubscribed</span>';
        const subDate = s.subscribed_at ? new Date(s.subscribed_at).toLocaleDateString() : '–';
        const confDate = s.confirmed_at ? new Date(s.confirmed_at).toLocaleDateString() : '–';
        return '<tr><td>' + (i + 1) + '</td><td>' + s.email + '</td><td>' + (s.name || '–') + '</td><td>' + badge + '</td><td>' + subDate + '</td><td>' + confDate + '</td></tr>';
      }).join('');
    })
    .catch(() => {
      document.getElementById('subscribersBody').innerHTML = '<tr><td colspan="6" class="empty-msg">Failed to load subscribers.</td></tr>';
    });
})();

// ── Compose Panel ─────────────────────────────────────────────────
function toggleCompose() {
  const panel = document.getElementById('composePanel');
  const btn = document.getElementById('btnCompose');
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open');
  btn.textContent = isOpen ? '\u2709 Compose Newsletter' : '\u2715 Close Compose';
}

function switchTab(tab) {
  const writePane = document.getElementById('paneWrite');
  const previewPane = document.getElementById('panePreview');
  const tabWrite = document.getElementById('tabWrite');
  const tabPreview = document.getElementById('tabPreview');
  if (tab === 'preview') {
    const body = document.getElementById('nBody').value;
    const iframe = document.getElementById('previewFrame');
    iframe.srcdoc = buildPreviewHtml(body);
    writePane.style.display = 'none';
    previewPane.style.display = '';
    tabWrite.classList.remove('active');
    tabPreview.classList.add('active');
  } else {
    writePane.style.display = '';
    previewPane.style.display = 'none';
    tabWrite.classList.add('active');
    tabPreview.classList.remove('active');
  }
}

function buildPreviewHtml(bodyHtml) {
  return [
    '<div style="max-width:560px;margin:0 auto;font-family:Arial,sans-serif;background:#F9F6EE;border:1px solid #e8e0d4;">',
    '<div style="background:#00172D;padding:28px 24px;text-align:center;border-bottom:3px solid #b87333;">',
    '<span style="font-family:Georgia,serif;font-size:28px;color:#d4956b;letter-spacing:4px;">PGD</span>',
    '<div style="color:rgba(249,246,238,0.5);font-size:10px;letter-spacing:2px;margin-top:6px;">PANDRA GLOBAL DYNAMICS</div>',
    '</div>',
    '<div style="padding:32px 28px;color:#333;font-size:14px;line-height:1.7;">' + bodyHtml + '</div>',
    '<div style="background:#00172D;padding:14px;text-align:center;">',
    '<span style="color:rgba(249,246,238,0.4);font-size:10px;">&copy; 2026 Pandra Global Dynamics Pvt Ltd &nbsp;&middot;&nbsp;<a href="#" style="color:rgba(249,246,238,0.5);">Unsubscribe</a></span>',
    '</div></div>'
  ].join('');
}

function confirmSend() {
  const subject = document.getElementById('nSubject').value.trim();
  const body = document.getElementById('nBody').value.trim();
  if (!subject) { alert('Please enter a subject line.'); return; }
  if (!body) { alert('Please enter email body content.'); return; }
  if (activeCount === 0) { alert('No confirmed subscribers to send to.'); return; }
  document.getElementById('confirmText').textContent =
    'Send \u201c' + subject + '\u201d to ' + activeCount + ' confirmed subscriber' + (activeCount !== 1 ? 's' : '') + '?';
  document.getElementById('confirmOverlay').classList.add('open');
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('open');
}

function doSend() {
  closeConfirm();
  const subject = document.getElementById('nSubject').value.trim();
  const body = document.getElementById('nBody').value.trim();
  const resultEl = document.getElementById('composeResult');
  const btn = document.getElementById('btnSend');

  btn.disabled = true;
  resultEl.className = 'compose-result sending';
  resultEl.style.display = 'block';
  resultEl.textContent = 'Sending to ' + activeCount + ' subscriber' + (activeCount !== 1 ? 's' : '') + '\u2026 please wait.';

  fetch('/api/newsletter/send', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ subject: subject, body_html: body })
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      resultEl.className = 'compose-result success';
      resultEl.textContent = data.message + (data.failed > 0 ? ' (' + data.failed + ' failed to deliver)' : '');
      document.getElementById('nSubject').value = '';
      document.getElementById('nBody').value = '';
    } else {
      resultEl.className = 'compose-result error';
      resultEl.textContent = 'Error: ' + (data.error || 'Send failed. Check your RESEND_API_KEY.');
    }
  })
  .catch(() => {
    resultEl.className = 'compose-result error';
    resultEl.textContent = 'Network error. Please try again.';
  })
  .finally(() => {
    btn.disabled = false;
  });
}

// Close confirm modal on overlay background click
document.getElementById('confirmOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeConfirm();
});
</script>
</body>
</html>
