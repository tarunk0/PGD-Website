<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Login – PGD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --copper: #b87333;
  --copper-lt: #d4943a;
  --copper-dk: #8b4e1a;
  --navy: #00172D;
  --navy-mid: #001e3c;
  --navy-lt: #0a2a50;
  --ivory: #F9F6EE;
  --ivory-dk: #ede8db;
  --charcoal: #2d2d2d;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Montserrat', sans-serif;
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

.login-container {
  width: 100%;
  max-width: 450px;
}

.login-card {
  background: var(--ivory);
  border-radius: 8px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  overflow: hidden;
}

.login-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-lt) 100%);
  padding: 2.5rem 2rem;
  text-align: center;
  border-bottom: 3px solid var(--copper);
}

.login-logo {
  font-family: 'Cinzel', serif;
  font-size: 2.5rem;
  font-weight: 700;
  color: var(--copper-lt);
  letter-spacing: 4px;
  margin-bottom: 0.5rem;
}

.login-subtitle {
  font-size: 0.8rem;
  letter-spacing: 2px;
  color: rgba(249, 246, 238, 0.6);
  text-transform: uppercase;
}

.login-body {
  padding: 2.5rem;
}

.form-group {
  margin-bottom: 1.5rem;
}

.form-group label {
  display: block;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--charcoal);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 0.6rem;
}

.form-group input {
  width: 100%;
  padding: 0.85rem 1rem;
  font-size: 0.95rem;
  border: 1px solid #e0e0e0;
  border-radius: 4px;
  transition: border-color 0.3s, box-shadow 0.3s;
  font-family: 'Montserrat', sans-serif;
}

.form-group input:focus {
  outline: none;
  border-color: var(--copper);
  box-shadow: 0 0 0 3px rgba(184, 115, 51, 0.1);
}

.form-group input::placeholder {
  color: #aaa;
}

.login-button {
  width: 100%;
  padding: 0.95rem;
  background: linear-gradient(135deg, var(--copper) 0%, var(--copper-lt) 100%);
  color: #fff;
  font-family: 'Montserrat', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 1rem;
}

.login-button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(184, 115, 51, 0.3);
}

.login-button:active {
  transform: translateY(0);
}

.error-message {
  background-color: #f8d7da;
  color: #721c24;
  padding: 0.85rem 1rem;
  border-radius: 4px;
  margin-bottom: 1.5rem;
  font-size: 0.9rem;
  border: 1px solid #f5c6cb;
  display: none;
}

.error-message.show {
  display: block;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateY(-10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.login-footer {
  padding: 1.5rem 2.5rem;
  background: rgba(184, 115, 51, 0.05);
  text-align: center;
  font-size: 0.75rem;
  color: var(--charcoal);
  letter-spacing: 1px;
}

.loading {
  display: none;
  text-align: center;
  margin-top: 1rem;
}

.spinner {
  border: 3px solid rgba(184, 115, 51, 0.2);
  border-top: 3px solid var(--copper);
  border-radius: 50%;
  width: 24px;
  height: 24px;
  animation: spin 0.8s linear infinite;
  margin: 0 auto;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">PGD</div>
      <div class="login-subtitle">Admin Access</div>
    </div>
    
    <form id="loginForm" class="login-body" onsubmit="handleLogin(event)">
      <div class="error-message" id="errorMsg"></div>
      
      <div class="form-group">
        <label for="username">Username</label>
        <input 
          type="text" 
          id="username" 
          name="username" 
          placeholder="Enter your username"
          required
          autofocus
        />
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="Enter your password"
          required
        />
      </div>
      
      <button type="submit" class="login-button" id="loginBtn">Sign In</button>
      <div class="loading" id="loading">
        <div class="spinner"></div>
      </div>
    </form>
    
    <div class="login-footer">
      🔒 Secure Access • Session Timeout: 24 Hours
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  // Check if already logged in
  fetch('/admin/check-session')
    .then(r => r.json())
    .then(d => {
      if (d.authenticated) {
        window.location.href = '/admin/inquiries';
      }
    });
});

function handleLogin(e) {
  e.preventDefault();
  
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');
  const loginBtn = document.getElementById('loginBtn');
  const loading = document.getElementById('loading');
  
  if (!username || !password) {
    showError('Username and password are required');
    return;
  }
  
  // Show loading state
  loginBtn.disabled = true;
  loading.style.display = 'block';
  errorMsg.classList.remove('show');
  
  fetch('/admin/login', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ username, password })
  })
  .then(response => response.json())
  .then(data => {
    if (data.success) {
      window.location.href = '/admin/inquiries';
    } else {
      showError(data.message || 'Invalid username or password');
    }
  })
  .catch(error => {
    showError('Error logging in. Please try again.');
    console.error('Login error:', error);
  })
  .finally(() => {
    loginBtn.disabled = false;
    loading.style.display = 'none';
  });
}

function showError(msg) {
  const errorMsg = document.getElementById('errorMsg');
  errorMsg.textContent = msg;
  errorMsg.classList.add('show');
}
</script>

</body>
</html>
